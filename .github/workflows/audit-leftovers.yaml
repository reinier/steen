# One-off probe: what Sway-base leftovers remain in the current steen:latest?
# Enumerates autostart entries (tray icons) and launcher .desktop files with their
# owning package, so we can build an exact removal list. Manual dispatch; delete after.
name: Audit leftovers

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-24.04
    steps:
      - name: Probe the published image
        run: |
          img=ghcr.io/reinier/steen:latest
          podman pull -q "$img"

          echo "===== AUTOSTART (/etc/xdg/autostart) — these are your tray icons / bg services ====="
          podman run --rm "$img" bash -c '
            for f in /etc/xdg/autostart/*.desktop; do
              [ -e "$f" ] || continue
              n=$(grep -m1 "^Name=" "$f" | cut -d= -f2-)
              printf "  %-40s  %s\n" "$(basename "$f")" "$n"
            done'

          echo
          echo "===== LAUNCHER ENTRIES (/usr/share/applications/*.desktop) + owning package ====="
          echo "     (NoDisplay=true ones are hidden from the launcher; flagged)"
          podman run --rm "$img" bash -c '
            for f in /usr/share/applications/*.desktop; do
              [ -e "$f" ] || continue
              base=$(basename "$f")
              nd=$(grep -qi "^NoDisplay=true" "$f" && echo "[hidden]" || echo "         ")
              pkg=$(rpm -qf "$f" 2>/dev/null || echo "unowned")
              printf "  %s %-45s %s\n" "$nd" "$base" "$pkg"
            done | sort -k3'

          echo
          echo "===== SUSPECT PACKAGES still installed (Sway-spin extras / redundant-with-DMS) ====="
          podman run --rm "$img" bash -c '
            for p in network-manager-applet nm-connection-editor imv wdisplays \
                     grim slurp grimshot wl-mirror wlsunset gammastep \
                     pavucontrol pavucontrol-qt blueberry blueman \
                     xfce4-appfinder rofi wofi fuzzel foot alacritty Thunar \
                     lxqt-policykit qt5ct wev wlr-randr swayimg mpv \
                     network-manager-applet-libs; do
              rpm -q "$p" >/dev/null 2>&1 && printf "  INSTALLED  %-28s %s\n" "$p" "$(rpm -q --qf %{VERSION} "$p")"
            done'

          echo
          echo "===== who requires network-manager-applet (safe to remove?) ====="
          podman run --rm "$img" bash -c 'rpm -q --whatrequires network-manager-applet 2>/dev/null | head || echo "(nothing requires it)"'
