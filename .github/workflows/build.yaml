name: Build Steen

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 2 * * *"   # daily: pick up new sway-atomic base images
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: steen
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # Pulled as its own retried step: quay's CDN intermittently drops the
      # connection mid-blob ("unexpected EOF"), which failed two builds already.
      # Pulling the floating :44 tag here also keeps "always latest F44" (0001).
      - name: Pull base image (retried — quay CDN is flaky)
        run: |
          img=quay.io/fedora-ostree-desktops/sway-atomic:44
          for i in 1 2 3 4 5; do
            if podman pull "$img"; then exit 0; fi
            echo "::warning::base pull attempt $i failed; retrying"
            sleep $((i * 15))
          done
          echo "::error::base pull failed after 5 attempts"
          exit 1

      - name: Build image
        run: podman build --platform=linux/amd64 -f Containerfile -t "${IMAGE_NAME}:latest" .

      - name: Lint
        run: podman run --rm --entrypoint bootc "${IMAGE_NAME}:latest" container lint

      - name: Push (signed with SIGNING_SECRET when available)
        if: github.event_name != 'pull_request'
        env:
          SIGNING_SECRET: ${{ secrets.SIGNING_SECRET }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

          # Only :latest — no pinning, no dated snapshot tags (see backlog/0001).
          # Recovery is `bootc rollback` to the previously booted deployment.
          podman tag "${IMAGE_NAME}:latest" "${REGISTRY}/${IMAGE_NAME}:latest"

          sign_args=()
          if [ -n "${SIGNING_SECRET}" ]; then
            key_file="$(mktemp)"
            printf '%s' "${SIGNING_SECRET}" > "${key_file}"
            trap 'rm -f "${key_file}"' EXIT
            # Storing sigstore signatures as registry attachments is off by
            # default; enable it for our namespace (matches the baked registries.d).
            sudo mkdir -p /etc/containers/registries.d
            printf 'docker:\n  %s:\n    use-sigstore-attachments: true\n' "${REGISTRY}" \
              | sudo tee /etc/containers/registries.d/steen.yaml >/dev/null
            # Sign with the sigstore private key; the matching public key is baked
            # into the image (cosign.pub) and required by its policy.json.
            # NOTE: assumes a passphrase-LESS key (empty passphrase via /dev/null).
            sign_args=(--sign-passphrase-file=/dev/null "--sign-by-sigstore-private-key=${key_file}")
          else
            echo "::warning::SIGNING_SECRET is not set — pushing UNSIGNED. The baked policy.json requires a signature, so 'bootc switch' to this image will be REJECTED until the secret is configured."
          fi

          podman push "${sign_args[@]}" "${REGISTRY}/${IMAGE_NAME}:latest"
