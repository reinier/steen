# 1Password ships its desktop payload in /opt/1Password; it's baked into
# /usr/lib/opt/1Password instead (see the Containerfile) so it ships and updates
# with the image. The app, its /usr/bin/1password symlink, and the .desktop Exec=
# still expect /opt/1Password, which on this ostree layout resolves through
# /opt -> var/opt. Recreate the path at every boot; L+ replaces anything stale so
# the app never resolves to an outdated payload.
d  /var/opt           0755 root root -
L+ /var/opt/1Password -    -    -    - /usr/lib/opt/1Password
