# Create 1Password's groups with FIXED GIDs so they exist at every boot with the exact
# GID baked into the setgid binaries.
#
# The 1Password RPMs create these groups imperatively (`groupadd`) in %post. On an
# ostree/bootc system that /etc/group entry does NOT survive a `bootc switch`: on the
# running machine the groups were simply gone, leaving `1Password-BrowserSupport`
# setgid to a dead GID (UNKNOWN) and `op` setgid to gid 1000 — the first user's own
# group. 1Password verifies its browser/CLI peers by group via SO_PEERCRED, so this
# broke browser integration outright (and was a small privilege bug for `op`).
#
# sysusers.d is declarative, ships in /usr, and re-runs on every boot, so the groups
# are always present. GIDs are EXPLICIT (not `-`): a dynamic GID would differ between
# build and runtime and re-break the match with the baked setgid bits. The build guards
# these exact numbers, so a collision fails the build rather than shipping silently.
g onepassword     923
g onepassword-cli 924
g onepassword-mcp 925
