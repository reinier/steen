# Create 1Password's groups with FIXED GIDs so they exist at every boot with the exact
# GID baked into the setgid binaries.
#
# The 1Password RPMs create these groups imperatively (`groupadd`) in %post, whose
# /etc/group entry does NOT survive a `bootc switch` — the groups vanish at runtime,
# leaving BrowserSupport setgid to a dead GID and `op` setgid to gid 1000 (the first
# user's group). sysusers.d is declarative, ships in /usr, and re-runs on every boot, so
# the groups are always present. GIDs are EXPLICIT (not `-`): a dynamic GID would differ
# between build and runtime and re-break the match with the baked setgid bits.
#
# GIDs MUST be >= 1000. 1Password's browser/CLI integration explicitly rejects a helper
# whose group gid is below 1000 ("invalid group attempted to connect") — it treats
# sub-1000 (system) groups as untrusted. An earlier cut used 923 (a system gid to avoid
# colliding with the user) and that was exactly why browser integration failed. 1500+ is
# above the user range on a single-user machine and clears the >= 1000 bar. The build
# guards these numbers, so a regression or collision fails the build.
g onepassword     1500
g onepassword-cli 1501
g onepassword-mcp 1502
