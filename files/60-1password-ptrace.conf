# 1Password's hardened runtime validates the peer of its xdg-desktop-portal
# file-picker calls via /proc/<pid>/root. With kernel.yama.ptrace_scope=0
# (unrestricted) that access is denied and the pickers — export (1PUX), import,
# file attachment, item icons — silently no-op with no dialog and no error.
# Restricting ptrace to 1 fixes it. This is also the Debian/Ubuntu/Arch default
# and a security hardening (a compromised process can't read another's memory).
kernel.yama.ptrace_scope = 1
