# Synology Drive's payload is baked into /usr/lib/opt/Synology (see the
# Containerfile) so it ships and updates with the image. The app and its
# /usr/bin/synology-drive launcher still expect /opt/Synology, which on this
# ostree layout resolves through the /opt -> var/opt symlink to
# /var/opt/Synology — machine-local state the image can't populate directly.
# Recreate that path at boot. L+ replaces whatever is already there (e.g. a stale
# directory left by a first-boot copy of an older build), so the app never
# resolves to an outdated payload.
d  /var/opt          0755 root root -
L+ /var/opt/Synology -    -    -    - /usr/lib/opt/Synology
